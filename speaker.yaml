esphome:
  name: final-speaker-test      # Или оставьте ваше имя "esp32-s3-home"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
  variant: ESP32S3
  psram: true

# Эти секции остаются как в файле GitHub
api:
ota:
  platform: esphome
logger:
  level: DEBUG

# --- Wi-Fi (оставляем вашу сеть, но убираем BSSID для универсальности) ---
wifi:
  networks:
    - ssid: "OpenWrt-2П"
      password: "35353535"
      # bssid: 50:4F:3B:3F:A6:A2  # Закомментируйте или удалите эту строку
  fast_connect: true

# --- Самое главное: ваши пины! ---
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO6        # Ваш пин
    i2s_bclk_pin: GPIO5          # Ваш пин

media_player:
  - platform: i2s_audio
    name: "Speaker"
    id: my_media_player
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO7
    dac_type: external          # обязательно для PCM5102
    mode: mono                   # если динамик один

microphone:
  - platform: i2s_audio
    id: my_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO4
    adc_type: external           # для I2S-микрофона
    pdm: false
    bits_per_sample: 16bit
    channel: left              # Явно укажите канал

# --- Voice Assistant (без wake word для начала) ---
voice_assistant:
  id: va
  microphone: my_mic
  media_player: my_media_player
  # use_wake_word: false          # По умолчанию false

binary_sensor:
  - platform: gpio
    name: "Action Button"
    pin:
      number: GPIO15
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      - voice_assistant.start
