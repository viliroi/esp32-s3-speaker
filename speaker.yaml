esphome:
  name: final-speaker-test

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
  # НАСТРОЙКИ ДЛЯ N16R8 (16MB Flash / 8MB PSRAM)
  board_build.arduino.memory_type: qio_opi # Обязательно для R8 (Octal PSRAM)
  board_build.flash_mode: qio
  board_build.f_flash: 80m

