esphome:
  name: final-speaker-test

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
  # ПАРАМЕТРЫ ДЛЯ ТВОЕЙ ПЛАТЫ N16R8 (16MB Flash / 8MB PSRAM)
  board_build.arduino.memory_type: opi_opi # Обязательно для 8MB PSRAM
  board_build.flash_mode: opi               # Обязательно для 16MB Flash
  board_build.f_flash: 80m
  board_build.f_cpu: 240000000L
