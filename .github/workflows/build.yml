name: Build ESPHome

on:
  push:
    branches: [ "основной" ]
  pull_request:
    branches: [ "основной" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: esphome/build-action@v2
        id: esphome-build
        with:
          config_file: speaker.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.esphome-build.outputs.name }}
