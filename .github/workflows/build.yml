name: Build ESPHome Manual

on:
  workflow_dispatch:
  push:
    branches: [ "основной" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Build Firmware
        run: esphome compile speaker.yaml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-firmware
          # Указываем путь к скрытой папке сборки ESPHome
          path: .esphome/build/my-speaker/.pioenvs/my-speaker/firmware.bin
          if-no-files-found: error # Выдаст ошибку, если опять не найдет (чтобы мы знали сразу)
